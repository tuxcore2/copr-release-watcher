name: COPR surumlerini kontrol et ve derlemeleri tetikle

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    env:
      COPR_WEBHOOKS: ${{ secrets.COPR_WEBHOOKS }}
      COPR_OWNER: ${{ secrets.COPR_OWNER }}
      COPR_PROJECT: ${{ secrets.COPR_PROJECT }}
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: apps.json'daki her projeyi kontrol et
        run: |
          set -e
          mkdir -p state

          if ! jq empty apps.json 2>/dev/null; then
            echo "HATA: apps.json gecersiz JSON formatinda! Duzeltmeden devam edilemez." >&2
            jq empty apps.json
            exit 1
          fi

          for row in $(jq -c '.[]' apps.json); do
            name=$(echo "$row" | jq -r '.name')
            repo=$(echo "$row" | jq -r '.repo')
            statefile="state/${name}.txt"

            tag=$(curl -sL -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/releases/latest" | jq -r '.tag_name')

            if [ -z "$tag" ] || [ "$tag" = "null" ]; then
              echo "UYARI: $name icin surum bilgisi alinamadi, atlaniyor."
              continue
            fi

            prev="none"
            [ -f "$statefile" ] && prev=$(cat "$statefile")
            tag_stripped=$(echo "$tag" | sed 's/^v//')

            copr_ver=$(curl -sL "https://copr.fedorainfracloud.org/api_3/package/?ownername=${COPR_OWNER}&projectname=${COPR_PROJECT}&packagename=${name}&with_latest_succeeded_build=True" \
              | jq -r '.builds.latest_succeeded.source_package.version // empty')

            need_trigger=0
            [ "$tag" != "$prev" ] && need_trigger=1
            case "$copr_ver" in
              *"$tag_stripped"*) ;;
              *) echo "    (COPR'da bu surume ait basarili build bulunamadi: '$copr_ver')"; need_trigger=1 ;;
            esac

            if [ "$need_trigger" = "1" ]; then
              echo "==> $name: tetikleniyor (github: $tag, copr: ${copr_ver:-yok}, kayitli: $prev)"
              webhook=$(echo "$COPR_WEBHOOKS" | jq -r --arg n "$name" '.[$n] // empty')

              if [ -n "$webhook" ]; then
                curl -sf -X POST "$webhook" && echo "    webhook tetiklendi."
              else
                echo "    UYARI: COPR_WEBHOOKS secret'inda '$name' icin URL bulunamadi!"
              fi

              echo "$tag" > "$statefile"
            else
              echo "==> $name: degisiklik yok ($tag)"
            fi
          done

      - name: Son kontrol zamanini ve surum degisikliklerini depoya kaydet
        run: |
          TZ='Europe/Istanbul' date +"%Y-%m-%d %H:%M %Z" > state/.last-check
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git commit -m "Kontrol: $(TZ='Europe/Istanbul' date +"%Y-%m-%d %H:%M %Z")"
          git push
